# Medallion Architecture Data Pipeline Job
# Orchestrates Bronze → Silver → Gold data processing
# Environment: ${bundle.target} (dev/uat/prod)

resources:
  jobs:
    medallion_pipeline:
      name: "Medallion Pipeline - ${bundle.target}"
      
      tasks:
        # Task 1: Bronze Layer - Raw Data Ingestion
        - task_key: bronze_layer
          notebook_task:
            notebook_path: ../src/Bronze
            base_parameters:
              environment: ${var.environment}
          compute_spec:
            kind: serverless  # Use serverless compute
          timeout_seconds: 0
          max_retries: 2
          min_retry_interval_millis: 30000
          retry_on_timeout: false
        
        # Task 2: Silver Layer - Data Transformation
        - task_key: silver_layer
          depends_on:
            - task_key: bronze_layer
          notebook_task:
            notebook_path: ../src/Silver
            base_parameters:
              environment: ${var.environment}
          compute_spec:
            kind: serverless
          timeout_seconds: 0
          max_retries: 2
          min_retry_interval_millis: 30000
          retry_on_timeout: false
        
        # Task 3: Gold Layer - Analytics & Optimization
        - task_key: gold_layer
          depends_on:
            - task_key: silver_layer
          notebook_task:
            notebook_path: ../src/Gold
            base_parameters:
              environment: ${var.environment}
          compute_spec:
            kind: serverless
          timeout_seconds: 0
          max_retries: 2
          min_retry_interval_millis: 30000
          retry_on_timeout: false
      
      # Schedule: Daily at 2 AM (disable in dev/uat, enable only in prod)
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
        timezone_id: "America/Los_Angeles"
        pause_status: PAUSED  # Paused by default in dev mode
      
      # Job-level parameters
      parameters:
        - name: environment
          default: ${var.environment}
      
      # Max concurrent runs
      max_concurrent_runs: 1
      
      # Timeout for entire job (4 hours)
      timeout_seconds: 14400
